services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - telegram-bot-api
    volumes:
      # Persist OAuth token so it survives container restarts
      - ./tokens:/app/tokens
      # Temp video files (avoids filling the container layer storage)
      - ./downloads:/app/downloads
      # Google OAuth client secrets (read-only)
      - ./client_secrets.json:/app/client_secrets.json:ro
      # Share telegram-bot-api file storage so local-mode download_to_drive() works
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro

volumes:
  telegram-bot-api-data:
