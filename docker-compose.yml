services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist OAuth token so it survives container restarts
      - ./tokens:/app/tokens
      # Temp video files (avoids filling the container layer storage)
      - ./downloads:/app/downloads
      # Google OAuth client secrets (read-only)
      - ./client_secrets.json:/app/client_secrets.json:ro
